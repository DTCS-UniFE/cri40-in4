---
- name: Bootstrap rete
  hosts: internet-fw:internal-fw
  become: true
  gather_facts: no
  tasks:
    - name: Attiva interfaccia NAT
      command: ip link set enp0s8 up

    - name: Ottieni IP via DHCP
      command: dhclient enp0s8

- name: Installazione e configurazione DHCP
  hosts: internal-fw
  become: true
  tasks:
    - name: apt-get update
      apt:
        update_cache: yes
    - name: install dhcp
      apt:
        name: ['isc-dhcp-server']
        state: latest

- name: Configura DHCP
  hosts: internal-fw
  become: true
  tasks:
    - name: copy dhcpd.conf to remote server
      template:
        src: ../roles/dhcp/templates/dhcpd.conf.j2
        dest: /etc/dhcp/dhcpd.conf
        mode: '0644'
    - name: restart DHCP
      service:
        name: isc-dhcp-server
        state: restarted

- name: Assegna IP statico a internal-fw
  hosts: internal
  become: true
  tasks:
    - name: configura indirizzo IP statico
      template:
        src: ../roles/dhcp/templates/01-netcfg.yaml.j2
        dest: /etc/netplan/01-netcfg.yaml
      notify:
        - apply netplan configuration
  handlers:
    - name: apply netplan configuration
      command: sudo netplan apply

- name: Attiva il forwarding
  hosts: internal
  become: true
  tasks:
    - name: set net.ipv4.ip_forward to 1
      sysctl:
        name: net.ipv4.ip_forward
        value: 1
        state: present
      notify:
        - Load sysctl settings
  handlers:
    - name: Load sysctl settings
      shell: sysctl -p

- name: Attiva tutte le interfacce di rete
  hosts: internet, subnet_a, internal, dmz, subnet_b
  become: true
  tasks:
    - name: Attiva tutte le interfacce di rete
      command: ip link set dev {{ item }} up
      with_items: "{{ ansible_interfaces }}"

- name: Configura scheda di rete
  hosts: subnet_b, internet, subnet_a, dmz
  become: true
  tasks:
    - name: IP subnet assegnato dal server DHCP
      template:
        src: ../roles/dhcp/templates/01-netcfg-tutte.yaml.j2
        dest: /etc/netplan/01-netcfg-all.yaml
      notify:
        - apply netplan configuration
  handlers:
    - name: apply netplan configuration
      command: sudo netplan apply

- name: Configura iptables su internet-fw
  hosts: internet-fw
  become: yes
  tasks:
    - name: Aggiorna cache apt
      apt:
        update_cache: yes

    - name: Installa iptables-persistent
      apt:
        name: iptables-persistent
        state: present

    - name: Copia lo script di configurazione iptables
      copy:
        src: ../roles/iptables/files/internet-fw-iptables-config.sh
        dest: /tmp/internet-fw-iptables-config.sh
        mode: '0755'

    - name: Esegui lo script iptables
      command: /tmp/iptables-config.sh
      async: 60
      poll: 0

    - name: Salva le regole iptables
      command: /usr/sbin/netfilter-persistent save


- name: Configura iptables su internal-fw
  hosts: internal-fw
  become: yes
  tasks:
    - name: Aggiorna cache apt
      apt:
        update_cache: yes

    - name: Installa iptables-persistent
      apt:
        name: iptables-persistent
        state: present

    - name: Copia lo script di configurazione iptables
      copy:
        src: ../roles/iptables/files/iptables-config.sh
        dest: /tmp/internal-fw-iptables-config.sh
        mode: '0755'

    - name: Esegui lo script iptables
      command: /tmp/iptables-config.sh
      async: 60
      poll: 0

    - name: Salva le regole iptables
      command: /usr/sbin/netfilter-persistent save


---
- name: Installazione Suricata
  hosts: dmz-suricata
  become: yes
  vars:
    suricata_version: "7.0.3"
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Installazione Suricata
      apt:
        name: suricata
        state: present

    - name: Riavvia suricata
      systemd:
        name: suricata
        state: restarted
        enabled: yes

    - name: Download Emerging Threats rules tar
      get_url:
        url: "https://rules.emergingthreats.net/open/suricata-{{ suricata_version }}/emerging.rules.tar.gz"
        dest: "/tmp/emerging.rules.tar.gz"

    - name: Verifica esistenza directory rules, altrimenti la crea
      file:
        path: "/etc/suricata/rules"
        state: directory
        mode: "0755"

    - name: Estrazione Emerging Threats rules
      unarchive:
        src: "/tmp/emerging.rules.tar.gz"
        dest: "/etc/suricata/rules"
        remote_src: yes
        extra_opts: [--strip-components=1]

    - name: Delete file tar
      file:
        path: "/tmp/emerging.rules.tar.gz"
        state: absent

- name: Installazione PostgreSQL
  hosts: dmz-db
  become: true

  tasks:
    - name: Update apt package manager repositories
      apt:
        update_cache: yes

    - name: Installazione PostgreSQL e dei suoi contrib package
      apt:
        name:
          - postgresql
          - postgresql-contrib
        state: present

    - name: Verifica che PostgreSQL service sia running ed enabled
      systemd:
        name: postgresql
        state: started
        enabled: yes

- hosts: dmz-wazuh
  become: yes

  tasks:
    - name: Aggiungi la chiave GPG di Wazuh
      apt_key:
        url: 'https://packages.wazuh.com/key/GPG-KEY-WAZUH'
        state: present

    - name: Aggiungi il repository Wazuh
      apt_repository:
        repo: 'deb https://packages.wazuh.com/4.x/apt/ stable main'
        state: present

    - name: Aggiorna l'elenco dei pacchetti
      apt:
        update_cache: yes

    - name: Installa il manager Wazuh
      apt:
        name: wazuh-manager
        state: present

    - name: Avvia il servizio Wazuh
      systemd:
        name: wazuh-manager
        state: started
        enabled: yes

- name: Installazione di Cowrie
  hosts: dmz-honeypot
  become: yes

  tasks:
    - name: Aggiorna cache apt
      apt:
        update_cache: yes
        cache_valid_time: 0

    - name: Pulisci eventuali metadati apt obsoleti
      command: apt-get clean
      changed_when: false

    - name: Aggiorna di nuovo la cache apt
      apt:
        update_cache: yes
        cache_valid_time: 0

    - name: Installa dipendenze necessarie
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - virtualenv
          - git
          - libssl-dev
          - libffi-dev
          - build-essential
          - authbind
        state: present

    - name: Creazione dell'utente non privilegiato per Cowrie
      user:
        name: cowrie
        system: yes
        shell: /usr/sbin/nologin
        home: /home/cowrie
        create_home: yes

    - name: Crea directory base di Cowrie
      file:
        path: /home/cowrie
        state: directory
        owner: cowrie
        group: cowrie
        mode: '0755'

    - name: Clonazione del repository Cowrie
      git:
        repo: https://github.com/cowrie/cowrie.git
        dest: /home/cowrie/cowrie
        update: yes
      become_user: cowrie

    - name: Creazione dell'ambiente virtuale per Cowrie
      command: python3 -m venv /home/cowrie/cowrie/cowrie-env
      args:
        creates: /home/cowrie/cowrie/cowrie-env/bin/activate
      become_user: cowrie

    - name: Copia il file di configurazione di Cowrie
      copy:
        src: ../roles/cowrie/files/cowrie.cfg
        dest: /home/cowrie/cowrie/cowrie-env/cowrie.cfg
        owner: cowrie
        group: cowrie
        mode: '0644'
      become_user: cowrie